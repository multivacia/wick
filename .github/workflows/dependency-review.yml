name: dependency-review

# GitHub Dependency review requires Dependency graph (Security settings).
# If unavailable on this repository, this job is advisory (continue-on-error)
# while pnpm audit + pnpm licenses remain enforceable in frontend-validate.
on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/dependency-review.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review (web/)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # License allowlist aligned with UX-R1 authorization governance.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC
